<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cacaueiro — Controle de Beneficiamento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cacao: #3B1F0A; --terra: #6B3A1F; --ouro: #C28B3A; --mel: #E8B86D;
    --areia: #F5ECD7; --creme: #FBF6EC; --verde: #2D5016; --verde-claro: #4A7C2A;
    --erro: #C0392B; --sucesso: #27AE60; --cinza: #8B7355; --sombra: rgba(59,31,10,0.15);
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--creme); color: var(--cacao); min-height: 100vh; padding-bottom: 80px; }
  header { background: var(--cacao); color: var(--areia); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px var(--sombra); }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; }
  .nav-tabs { display: flex; overflow-x: auto; gap: 6px; padding: 14px 16px 0; background: var(--cacao); }
  .tab-btn { flex-shrink: 0; padding: 8px 16px; border: none; border-radius: 20px 20px 0 0; background: rgba(255,255,255,0.1); color: var(--mel); font-size: 0.8rem; cursor: pointer; }
  .tab-btn.active { background: var(--creme); color: var(--cacao); font-weight: 600; }
  main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .screen { display: none; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .form-section { background: white; border-radius: var(--r); overflow: hidden; margin-bottom: 14px; box-shadow: 0 2px 8px var(--sombra); }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--cacao); color: var(--areia); cursor: pointer; }
  .section-body { display: none; padding: 18px 16px; }
  .section-body.open { display: block; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--terra); margin-bottom: 6px; text-transform: uppercase; }
  .field input, .field select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--areia); border-radius: 8px; font-size: 1rem; background: var(--creme); }
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-align: center; }
  .btn-primary { background: var(--cacao); color: var(--areia); }
  .btn-gold { background: var(--ouro); color: white; }
  .img-upload-zone { border: 2px dashed var(--mel); border-radius: var(--r); padding: 24px; text-align: center; background: var(--areia); cursor: pointer; }
  .img-preview img { width: 100%; border-radius: 8px; margin-top: 10px; }
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--cacao); color: var(--areia); padding: 12px 22px; border-radius: 30px; display: none; z-index: 300; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>☽ Cacaueiro</h1>
  <p>Gestão de Beneficiamento</p>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="showScreen('lotes')">🌱 Lotes</button>
  <button class="tab-btn" onclick="showScreen('novo')">＋ Novo Lote</button>
</div>

<main>
  <div class="screen active" id="screen-lotes">
    <div id="lotes-list"></div>
  </div>

  <div class="screen" id="screen-novo">
    <div class="form-section">
      <div class="section-header"><h3>Novo Registro</h3></div>
      <div class="section-body open">
        <div class="field"><label>Lote</label><input type="text" id="n-lote" placeholder="Ex: LOTE-001"></div>
        <div class="field"><label>Referência</label><input type="text" id="n-ref" placeholder="Nome do produtor"></div>
        <div class="field"><label>Data Quebra</label><input type="date" id="n-data-quebra"></div>
        <button class="btn btn-primary" onclick="criarLote()">Criar e Sincronizar</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-detalhe">
    <h2 id="d-lote-titulo" style="margin-bottom:15px"></h2>
    
    <div class="form-section">
      <div class="section-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <h3>Teste de Corte & Foto</h3>
      </div>
      <div class="section-body">
        <div class="field"><label>% Fermentação Total</label><input type="number" id="d-ferm-total"></div>
        <div class="img-upload-zone" onclick="document.getElementById('foto-input').click()">
          <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this)">
          <p>📸 Tirar Foto da Tábua</p>
        </div>
        <div id="preview-container" class="img-preview"></div>
        <button class="btn btn-gold" style="margin-top:15px" onclick="salvarCorte()">Enviar para Planilha</button>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxja7SD8Oj9tZl8p3coUYRbemysKLoUgHp35bvmslNvdiQ-_7dfZgKorCkm8qrz8Vc9/exec";
  let lotes = JSON.parse(localStorage.getItem('cacaueiro_lotes')) || [];
  let loteAtivo = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  async function enviarParaGoogle(dados) {
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(dados)
      });
      return true;
    } catch (e) { return false; }
  }

  function criarLote() {
    const lote = {
      id: document.getElementById('n-lote').value,
      ref: document.getElementById('n-ref').value,
      data: document.getElementById('n-data-quebra').value,
      acao: "CRIAR_LOTE"
    };
    lotes.push(lote);
    localStorage.setItem('cacaueiro_lotes', JSON.stringify(lotes));
    enviarParaGoogle(lote);
    toast("✅ Lote criado!");
    showScreen('lotes');
    renderLotes();
  }

  function renderLotes() {
    const list = document.getElementById('lotes-list');
    list.innerHTML = lotes.map(l => `
      <div class="form-section" style="padding:15px" onclick="abrirLote('${l.id}')">
        <strong>${l.id}</strong> - ${l.ref}
      </div>
    `).join('');
  }

  function abrirLote(id) {
    loteAtivo = lotes.find(l => l.id === id);
    document.getElementById('d-lote-titulo').innerText = "Lote: " + id;
    showScreen('detalhe');
  }

  function previewImg(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('preview-container').innerHTML = `<img src="${e.target.result}" id="img-data">`;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  async function salvarCorte() {
    const imgElement = document.getElementById('img-data');
    const dados = {
      acao: "SALVAR_CORTE",
      lote: loteAtivo.id,
      fermentacao: document.getElementById('d-ferm-total').value,
      foto: imgElement ? imgElement.src : null
    };
    
    toast("⏳ A enviar dados e foto...");
    const ok = await enviarParaGoogle(dados);
    toast(ok ? "✅ Sincronizado com a Planilha!" : "⚠️ Salvo apenas localmente");
  }

  window.onload = renderLotes;
</script>

</body>
</html>
